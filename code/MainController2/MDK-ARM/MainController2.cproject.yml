project:
  packs:
    - pack: ARM::CMSIS@^6.1.0
    - pack: Keil::STM32G4xx_DFP@^2.0.0
    - pack: ARM::CMSIS-NN@^4.0.0
    - pack: ARM::CMSIS-DSP@^1.10.1
  setups:
    - setup: Options for MainController2
      processor:
        fpu: sp
      add-path:
        - ../Core/Inc
        - ../Drivers/STM32G4xx_HAL_Driver/Inc
        - ../Drivers/STM32G4xx_HAL_Driver/Inc/Legacy
        - ../Drivers/CMSIS/Device/ST/STM32G4xx/Include
        - ../Drivers/CMSIS/Include
        - ../USB_Device/App
        - ../USB_Device/Target
        - ../Middlewares/ST/STM32_USB_Device_Library/Core/Inc
        - ../Middlewares/ST/STM32_USB_Device_Library/Class/CDC/Inc
        - ../HARDWARE/LCD
        - ../Libs/gui_usr
        - ../Libs/ZUI
        - ../Libs/TMP102
        - ../Libs/Motors
        - ../Libs/SDM18
        - ../Libs/EEPROM
        - ../Libs/lvgl
        - ../Libs/lvgl/src
        - ../Libs/lvgl/examples/porting
      debug: "on"
      define:
        - USE_HAL_DRIVER
        - STM32G474xx
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: stm32g474xx_flash.sct
  groups:
    - group: Application/MDK-ARM
      files:
        - file: startup_stm32g431xx.s
    - group: Application/User/Core
      files:
        - file: ../Core/Src/main.c
